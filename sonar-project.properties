# 🖥️ SonarCloud Project Configuration

# Organization and project keys (linked to your GitHub repo)
sonar.organization=parv-agrawal26
sonar.projectKey=Parv-Agrawal26_SkyBooker-Frontend

# General project information
sonar.projectName=SkyBooker-Frontend
sonar.projectVersion=1.0

# Paths to the source directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/__tests__/**/*.test.js,src/__tests__/**/*.test.jsx

# Exclude visual pages from coverage to match your Jest settings
sonar.coverage.exclusions=src/index.js,src/App.jsx,src/pages/**

# Exclude non-source files from analysis
sonar.exclusions=**/node_modules/**,build/**,coverage/**,**/*.css,**/*.svg

# 📊 Test Coverage Configuration
# Tell SonarCloud where to find the generated Jest coverage report
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Source code encoding
sonar.sourceEncoding=UTF-8
